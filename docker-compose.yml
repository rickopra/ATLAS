services:
  postgres:
    image: postgres:16-alpine
    container_name: atlas-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - atlas_net

  redis:
    image: redis:7-alpine
    container_name: atlas-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - atlas_net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: atlas-api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - atlas_storage:/atlas-data
      - ./secure:/var/www/ATLAS/secure:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - atlas_net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: atlas-web
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - atlas_net

  nginx:
    image: nginx:1.27-alpine
    container_name: atlas-nginx
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - atlas_net

volumes:
  postgres_data:
  redis_data:
  atlas_storage:

networks:
  atlas_net:
    driver: bridge
